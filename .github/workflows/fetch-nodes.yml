name: Fetch Free Nodes

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch latest subscriptions
        run: |
          python scripts/fetch_nodes.py --repo-root .

      - name: Commit and push changes
        run: |
          if git diff --quiet -- output/clash.yaml output/v2ray.yaml output/stats.json; then
            echo "No subscription file changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/clash.yaml output/v2ray.yaml output/stats.json
          git commit -m "chore: update subscriptions and stats"
          git push origin HEAD:${{ github.event.repository.default_branch }}
